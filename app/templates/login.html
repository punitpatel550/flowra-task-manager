{% extends "base.html" %}

{% block content %}

<style>

/* Background */

.login-page{

min-height:80vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#eef2ff,#f5f3ff,#f0f9ff);

}

/* Login Card */

.login-card{

width:420px;

background:rgba(255,255,255,0.9);

backdrop-filter:blur(10px);

border-radius:18px;

padding:40px;

box-shadow:0 20px 60px rgba(0,0,0,0.12);

text-align:center;

}

/* Logo */

.login-logo{

width:90px;

margin-bottom:10px;

}

/* Title */

.login-title{

font-size:26px;

font-weight:600;

margin-bottom:25px;

color:#2563eb;

}

/* Inputs */

.input-group{

margin-bottom:18px;

}

.input-group-text{

background:transparent;

border-right:none;

}

.form-control{

border-left:none;

height:48px;

}

/* Button */

.login-btn{

width:100%;

height:48px;

border:none;

border-radius:10px;

background:linear-gradient(135deg,#2563eb,#7c3aed);

color:white;

font-weight:600;

margin-top:10px;

transition:.3s;

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

/* Back button */

.back-btn{

margin-top:10px;

width:100%;

}

</style>


<div class="login-page">

<div class="login-card">

<img class="login-logo" src="{{ url_for('static', filename='images/flowra(2).png') }}">

<div class="login-title">Flowra Login</div>

<form method="POST">

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-user"></i>
</span>

<input type="text" class="form-control" name="username" placeholder="Username or Email" required>

</div>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input type="password" class="form-control" name="password" placeholder="Password" required>

</div>

<button type="submit" class="login-btn">
Login
</button>

<button type="button" onclick="history.back()" class="btn btn-secondary back-btn">
⬅ Back
</button>

</form>

</div>

</div>

{% endblock %}
