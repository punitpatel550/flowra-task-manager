<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flowra Task Manager</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='flowra_favicon.ico') }}">

<style>
*{
font-family:'Poppins',sans-serif;
}

html,body{
min-height:100%;
}

body{
background:linear-gradient(135deg,#eef2ff,#f5f3ff,#f0f9ff);
min-height:100vh;
color:#1f2937;
display:flex;
flex-direction:column;
}

/* NAVBAR */

.navbar{
background:rgba(255,255,255,0.82);
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.08);
padding:14px 0;
min-height:95px;
}

.navbar-brand{
font-weight:700;
font-size:24px;
display:flex;
align-items:center;
gap:14px;
margin:0;
padding:0;
line-height:1;
}

.navbar-brand img{
height:95px;
width:auto;
max-width:none;
object-fit:contain;
transition:0.3s;
display:block;
}

.navbar-brand span{
color:#2563eb;
font-weight:800;
letter-spacing:0.5px;
font-size:28px;
line-height:1;
}

.navbar .btn{
margin-left:10px;
border-radius:10px;
padding:7px 14px;
font-weight:500;
}

/* BUTTONS */

.btn-outline-light{
border-color:#2563eb;
color:#2563eb;
background:transparent;
}

.btn-outline-light:hover{
background:#2563eb;
color:white;
}

.btn-danger{
background:#ff4d6d;
border:none;
}

.btn-danger:hover{
background:#e63d5e;
}

.btn-primary{
background:linear-gradient(135deg,#2563eb,#7c3aed);
border:none;
}

.btn-primary:hover{
opacity:0.95;
}

/* CARDS */

.card{
background:rgba(255,255,255,0.82);
backdrop-filter:blur(10px);
border:none;
border-radius:18px;
box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

/* TABLE */

.table{
background:white;
border-radius:12px;
overflow:hidden;
}

.table thead{
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
}

/* FORMS */

.form-control,
.form-select{
border-radius:12px;
border:1px solid #d1d5db;
}

.form-control:focus,
.form-select:focus{
border-color:#2563eb;
box-shadow:none;
}

/* HEADINGS */

h1,h2,h3,h4,h5{
color:#2563eb;
font-weight:600;
}

/* BADGES */

.badge.bg-success{
background:#22c55e !important;
}

.badge.bg-danger{
background:#ff4d6d !important;
}

.badge.bg-warning{
background:#facc15 !important;
color:black !important;
}

/* MODAL */

.modal-content{
border-radius:18px;
}

/* MAIN */

.main-wrapper{
flex:1;
}

/* FOOTER */

footer{
background:#111827;
color:#cbd5e1;
padding:20px;
margin-top:40px;
}

.app-footer p{
margin:0;
}

@media (max-width: 768px){
.navbar-brand img{
height:58px;
}

.navbar-brand span{
font-size:18px;
}

.navbar .btn{
margin-left:6px;
margin-top:6px;
}
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand" href="{{ url_for('main.dashboard') }}">
<img src="{{ url_for('static', filename='images/flowra(2).png') }}" alt="Flowra Logo">
<span>FLOWRA</span>
</a>

<div>
{% if session.get("user_id") %}

<a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-light btn-sm">
<i class="fa fa-chart-line"></i> Dashboard
</a>

<a href="{{ url_for('main.logout') }}" class="btn btn-danger btn-sm">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

{% endif %}

{% if current_user.is_authenticated and current_user.role == 'admin' %}
{% endif %}
</div>

</div>
</nav>

<!-- MAIN CONTENT -->

<div class="container-fluid p-0 main-wrapper">
{% block content %}{% endblock %}
</div>

<!-- REMINDER SCRIPT -->

<script>
let alarm = new Audio("/static/sounds/alarm.mp3")
alarm.loop = true

function playAlarm(id){
alarm.play()

let box = document.createElement("div")

box.innerHTML = `
<div style="position:fixed;top:20px;right:20px;background:white;color:black;padding:15px;border-radius:12px;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,0.2)">
🔔 Reminder
<button onclick="stopReminder(${id})" style="margin-left:10px;background:#ff4d6d;color:white;border:none;padding:6px 12px;border-radius:8px">
Stop
</button>
</div>
`

document.body.appendChild(box)
}

function stopReminder(id){
alarm.pause()
alarm.currentTime = 0

fetch("/stop_reminder/"+id,{
method:"POST"
})
}

setInterval(()=>{
fetch("/get_reminders")
.then(res=>res.json())
.then(data=>{
data.forEach(r=>{
playAlarm(r.id)
})
})
},10000)
</script>

<footer class="app-footer text-center py-3">
<p>© 2026 Flowra • Developed by Jodidar India</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
