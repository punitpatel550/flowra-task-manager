{% extends "base.html" %}

{% block title %}Manage Departments{% endblock %}

{% block content %}

<style>

/* PAGE BACKGROUND */

.department-page{
position:relative;
min-height:100vh;
background:linear-gradient(270deg,#eef2ff,#f5f3ff,#e0f2fe,#ede9fe);
background-size:600% 600%;
animation:gradientMove 18s ease infinite;
overflow:hidden;
padding:40px;
}

/* FLOATING BLOBS */

.department-page::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#7c3aed;
opacity:0.15;
filter:blur(140px);
top:-150px;
left:-150px;
animation:floatBlob1 20s infinite alternate;
}

.department-page::after{
content:"";
position:absolute;
width:450px;
height:450px;
background:#2563eb;
opacity:0.15;
filter:blur(140px);
bottom:-120px;
right:-120px;
animation:floatBlob2 22s infinite alternate;
}

/* ANIMATIONS */

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes floatBlob1{
0%{transform:translate(0,0)}
100%{transform:translate(120px,80px)}
}

@keyframes floatBlob2{
0%{transform:translate(0,0)}
100%{transform:translate(-120px,-60px)}
}

/* CARD */

.page-card{
max-width:700px;
margin:auto;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
border-radius:20px;
padding:35px;
box-shadow:0 20px 40px rgba(0,0,0,0.12);
position:relative;
z-index:2;
}

/* TITLE */

.page-title{
color:#2563eb;
font-weight:700;
margin-bottom:25px;
}

/* INPUT */

.form-control{
border-radius:12px;
border:1px solid #e5e7eb;
}

.form-control:focus{
border-color:#2563eb;
box-shadow:none;
}

/* BUTTONS */

.btn-primary{
background:linear-gradient(135deg,#2563eb,#7c3aed);
border:none;
border-radius:10px;
}

.btn-secondary{
border-radius:10px;
}

/* DEPARTMENT LIST */

.dept-list{
background:#f8fafc;
border-radius:14px;
overflow:hidden;
border:1px solid #e5e7eb;
}

.dept-item{
padding:14px 18px;
border-bottom:1px solid #e5e7eb;
display:flex;
justify-content:space-between;
align-items:center;
}

.dept-item:last-child{
border-bottom:none;
}

.dept-name{
font-weight:500;
color:#334155;
}

.delete-btn{
font-size:13px;
}

</style>


<div class="department-page">

<div class="page-card">

<h3 class="page-title">Manage Departments</h3>

<!-- CREATE DEPARTMENT -->

<form method="POST">

<div class="mb-3">

<label class="form-label fw-semibold">
Department Name
</label>

<input type="text"
name="name"
class="form-control"
placeholder="Enter department name"
required>

</div>

<div class="d-flex gap-2">

<button class="btn btn-primary">
➕ Create Department
</button>

<button type="button"
onclick="history.back()"
class="btn btn-secondary">

⬅ Back

</button>

</div>

</form>

<hr class="my-4">


<!-- DEPARTMENT LIST -->

<h5 class="mb-3 fw-semibold text-primary">
Departments
</h5>

<div class="dept-list">

{% if departments %}

{% for d in departments %}

<div class="dept-item">

<span class="dept-name">

{{ d.name }}

</span>

<form action="{{ url_for('main.delete_department', id=dept.id) }}" method="POST" style="display:inline;">
    <button type="submit" class="btn btn-danger btn-sm"
            onclick="return confirm('Are you sure you want to delete this department?')">
        Delete
    </button>
</form>

</div>

{% endfor %}

{% else %}

<p class="text-muted p-3 mb-0">
No departments created.
</p>

{% endif %}

</div>

</div>

</div>

{% endblock %}
