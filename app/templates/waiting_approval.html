<h3>Waiting for approval...</h3>

<script>
setInterval(function () {
    fetch("/check-login-status/{{ token }}")
    .then(res => res.json())
    .then(data => {
        if (data.status === "Approved") {
            window.location.href = "/login-success/{{ token }}";
        }
        if (data.status === "Denied") {
            alert("Login denied");
            window.location.href = "/login";
        }
    });
}, 3000);
</script>
